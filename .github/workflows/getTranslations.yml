name: Get Translations

on:
  workflow_dispatch:
    inputs:
      files:
        description: 'Lista dei file markdown da elaborare (formato JSON array)'
        required: true
        type: string
        default: '[]'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.JS
        uses: ./.github/actions/setup-node

      - name: Debug input
        run: |
          echo "Received files: ${{ inputs.files }}"

      - name: Cache npm dependencies
        id: cache-npm
        uses: actions/cache@v3 # Nota: ho messo v3 standard, se usi hash specifico va bene uguale
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: |
          npm config set cache ~/.npm
          npm ci

      - name: Generate crowdin.yml from input
        env:
          FILES_LIST: ${{ inputs.files }}
        run: npm run generate_file

      - name: crowdin action
        uses: crowdin/github-action@v2
        with:
          upload_sources: false
          upload_translations: false
          auto_approve_imported: true
          download_translations: true
          localization_branch_name: l10n_crowdin_translations
          create_pull_request: true
          push_sources: false
          pull_request_title: 'New Crowdin Translations'
          pull_request_body: 'New Crowdin translations by [Crowdin GH Action](https://github.com/crowdin/github-action)'
          pull_request_base_branch_name: 'main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
